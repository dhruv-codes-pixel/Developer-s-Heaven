<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SiteStock — Material Order Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — SiteStock
     Subject: job-site material tracking. Cards read like stenciled
     crate tags; backgrounds carry a faint blueprint grid.
     ============================================================ */
  :root {
    --navy:         #16243B;   /* deep surfaces / header */
    --navy-soft:    #1E3354;   /* card surface on dark areas */
    --steel:        #2F5D8C;   /* secondary accent */
    --amber:        #F2A93B;   /* primary action / hi-vis */
    --amber-dark:   #D8901F;
    --concrete:     #EDEAE3;   /* page background */
    --concrete-line:#DAD5C9;   /* grid lines on concrete */
    --ink:          #171A1F;   /* primary text */
    --ink-soft:     #51596B;   /* secondary text */
    --paper:        #FBFAF7;   /* card surface on light areas */
    --green:        #4C9A6B;
    --green-dark:   #3A7A54;
    --red:          #C0473A;
    --red-dark:     #A23A2F;

    --font-display: 'Oswald', sans-serif;
    --font-body:    'Inter', sans-serif;
    --font-mono:    'IBM Plex Mono', monospace;

    --radius-sm: 6px;
    --radius-md: 10px;
    --shadow-card: 0 2px 0 rgba(23,26,31,0.06), 0 8px 20px -10px rgba(23,26,31,0.25);
    --shadow-pop:  0 20px 50px -15px rgba(23,26,31,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--ink);
    background-color: var(--concrete);
    background-image:
      linear-gradient(var(--concrete-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--concrete-line) 1px, transparent 1px);
    background-size: 28px 28px;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  a { color: inherit; }

  ::selection { background: var(--amber); color: var(--ink); }

  :focus-visible {
    outline: 2px solid var(--steel);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }

  /* ---------- Shared typography ---------- */
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    padding: 11px 18px;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }
  .btn:active { transform: translateY(1px); }

  .btn-primary {
    background: var(--amber);
    color: var(--ink);
    box-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 6px 14px -6px rgba(242,169,59,0.55);
  }
  .btn-primary:hover { background: var(--amber-dark); }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid rgba(23,26,31,0.15);
  }
  .btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }

  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover { background: var(--red-dark); }

  .btn-icon {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    padding: 6px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .btn-icon:hover { background: rgba(23,26,31,0.06); color: var(--ink); }

  /* ---------- Form fields ---------- */
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: left;
  }
  .field label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .field input,
  .field select {
    border: 1.5px solid rgba(23,26,31,0.18);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    font-size: 15px;
    background: #fff;
    color: var(--ink);
    transition: border-color 0.12s ease;
  }
  .field input:focus,
  .field select:focus {
    border-color: var(--steel);
  }
  .field-error {
    color: var(--red);
    font-size: 12.5px;
    font-family: var(--font-mono);
  }
  .material-autocomplete-wrap {
    position: relative;
  }
  .material-suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    z-index: 20;
    background: var(--paper);
    border: 1.5px solid rgba(23,26,31,0.18);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-pop);
    max-height: 220px;
    overflow-y: auto;
    padding: 4px;
  }
  .material-suggestion-item {
    padding: 9px 10px;
    font-size: 14px;
    color: var(--ink);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .material-suggestion-item:hover {
    background: rgba(47,93,140,0.10);
  }

  /* ---------- Banners ---------- */
  .banner {
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13.5px;
    font-family: var(--font-mono);
    border-left: 3px solid;
    line-height: 1.45;
  }
  .banner-error {
    background: #FBEAE7;
    border-color: var(--red);
    color: var(--red-dark);
  }
  .banner-info {
    background: #EAF1F8;
    border-color: var(--steel);
    color: var(--navy);
  }

  /* ---------- Spinner ---------- */
  .spinner {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(23,26,31,0.2);
    border-top-color: var(--ink);
    animation: spin 0.7s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }
  .spinner-light {
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .full-loading {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 13px;
    gap: 10px;
  }

  /* ============================================================
     AUTH SCREEN
     ============================================================ */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 400px;
    background: var(--paper);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-pop);
    padding: 36px 32px 32px;
    position: relative;
    border: 1px solid rgba(23,26,31,0.08);
  }
  /* amber corner stamp */
  .auth-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--amber) 0 50%, transparent 50%);
    border-radius: var(--radius-md) 0 0 0;
    opacity: 0.9;
  }
  .auth-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 26px;
  }
  .auth-brand-mark {
    width: 34px; height: 34px;
    border-radius: 7px;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    color: var(--amber);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }
  .auth-brand-name {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.01em;
    color: var(--navy);
  }
  .auth-title {
    font-family: var(--font-display);
    font-size: 27px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .auth-sub {
    font-size: 14.5px;
    color: var(--ink-soft);
    margin: 0 0 24px;
    line-height: 1.45;
  }
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .auth-submit { width: 100%; padding: 13px; font-size: 15px; margin-top: 4px; }
  .auth-toggle {
    margin-top: 22px;
    text-align: center;
    font-size: 13.5px;
    color: var(--ink-soft);
  }
  .auth-toggle button {
    background: none; border: none; padding: 0;
    color: var(--steel);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }
  .auth-toggle button:hover { color: var(--navy); }

  /* ============================================================
     APP HEADER (projects screen)
     ============================================================ */
  .app-header {
    background: var(--navy);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--amber);
  }
  .app-header .auth-brand-name { color: #fff; }
  .app-header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .app-header-email {
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: rgba(255,255,255,0.6);
  }
  .signout-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .signout-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

  /* ============================================================
     PROJECTS SCREEN
     ============================================================ */
  .projects-main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }
  .projects-toolbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .projects-heading h1 {
    font-family: var(--font-display);
    font-size: 29px;
    margin: 4px 0 0;
    color: var(--ink);
  }
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 18px;
  }
  .project-card {
    position: relative;
    background: var(--paper);
    border: 1px solid rgba(23,26,31,0.10);
    border-left: 4px solid transparent;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 20px 18px 18px;
    display: flex;
    flex-direction: column;
    min-height: 140px;
    transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  }
  .project-card:hover {
    border-left-color: var(--amber);
    box-shadow: 0 4px 0 rgba(23,26,31,0.06), 0 14px 30px -12px rgba(23,26,31,0.3);
    transform: translateY(-2px);
  }
  .project-card-stamp {
    position: absolute;
    top: 14px; right: 14px;
    width: 26px; height: 26px;
    border: 1.5px dashed rgba(23,26,31,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-soft);
  }
  .project-card-name {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 6px;
    padding-right: 30px;
    word-break: break-word;
    line-height: 1.25;
  }
  .project-card-meta {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .project-card-actions {
    margin-top: auto;
    padding-top: 14px;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .project-card:hover .project-card-actions,
  .project-card:focus-within .project-card-actions { opacity: 1; }
  .project-card-actions button { font-size: 12.5px; padding: 6px 10px; }

  .project-rename-input {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    border: 1.5px solid var(--steel);
    border-radius: 5px;
    padding: 4px 8px;
    margin: 0 0 6px;
    width: 100%;
  }

  /* "new project" tile */
  .project-card-new {
    background: transparent;
    border: 2px dashed rgba(23,26,31,0.22);
    box-shadow: none;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-family: var(--font-display);
    font-size: 16px;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .project-card-new:hover {
    border-color: var(--steel);
    color: var(--steel);
    background: rgba(47,93,140,0.04);
    transform: none;
  }
  .project-card-new .plus {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--amber);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    line-height: 1;
  }

  .empty-state {
    text-align: center;
    padding: 70px 20px;
    color: var(--ink-soft);
  }
  .empty-state h3 {
    font-family: var(--font-display);
    color: var(--ink);
    font-size: 21px;
    margin-bottom: 6px;
  }
  .empty-state p { font-size: 14.5px; line-height: 1.5; }

  /* ============================================================
     MODAL
     ============================================================ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(22,36,59,0.55);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    z-index: 100;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-card {
    background: var(--paper);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-pop);
    width: 100%;
    max-width: 430px;
    padding: 28px 26px 24px;
    animation: popIn 0.18s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .modal-body-text {
    font-size: 14.5px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.55;
  }
  .modal-body-text strong { color: var(--ink); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
  }
  .modal-icon-warn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #FBEAE7;
    color: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  /* ============================================================
     DASHBOARD HEADER
     ============================================================ */
  .dashboard-header {
    background: var(--navy);
    color: #fff;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--amber);
    gap: 16px;
    flex-wrap: wrap;
  }
  .dashboard-header-left {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }
  .back-link {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .back-link:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
  .dashboard-project-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dashboard-project-eyebrow {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  /* ============================================================
     TAB BAR
     ============================================================ */
  .tab-bar {
    display: flex;
    gap: 2px;
    background: var(--navy-soft);
    padding: 0 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.55);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    padding: 14px 16px 11px;
    border-bottom: 3px solid transparent;
    transition: color 0.12s ease, border-color 0.12s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.85); }
  .tab-btn.tab-active {
    color: #fff;
    border-bottom-color: var(--amber);
  }

  /* ============================================================
     DASHBOARD MAIN AREA
     ============================================================ */
  .dashboard-main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 32px 80px;
  }

  /* ============================================================
     LOG ENTRY FORM
     ============================================================ */
  .log-card {
    background: var(--paper);
    border: 1px solid rgba(23,26,31,0.10);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 22px 22px 20px;
    margin-bottom: 28px;
  }
  .log-card-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .log-form-grid {
    display: grid;
    grid-template-columns: 132px minmax(160px, 1.6fr) 100px 120px 130px auto;
    gap: 14px;
    align-items: end;
  }
  .log-form-grid .field input,
  .log-form-grid .field select {
    padding: 10px 11px;
    font-size: 14.5px;
  }
  .log-form-submit { height: 42px; white-space: nowrap; }

  /* ============================================================
     LEDGER TABLE
     ============================================================ */
  .ledger-card {
    background: var(--paper);
    border: 1px solid rgba(23,26,31,0.10);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .ledger-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 0;
  }
  .ledger-card-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin: 0;
  }
  .ledger-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .ledger-scroll {
    overflow-x: auto;
    padding: 14px 22px 6px;
    -webkit-overflow-scrolling: touch;
  }
  .ledger-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
  }
  .ledger-table thead th {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1.5px solid rgba(23,26,31,0.12);
    white-space: nowrap;
  }
  .ledger-table thead th.num { text-align: right; }
  .ledger-table tbody td {
    padding: 16px 12px;
    border-bottom: 1px solid rgba(23,26,31,0.07);
    font-size: 14.5px;
    color: var(--ink);
    vertical-align: middle;
  }
  .ledger-table tbody tr:last-child td { border-bottom: none; }
  .ledger-table tbody tr:hover { background: rgba(47,93,140,0.035); }
  .ledger-table tbody tr.editing-row { background: rgba(242,169,59,0.08); }
  .ledger-table td.num,
  .ledger-table td.cell-date,
  .ledger-table td.cell-qty,
  .ledger-table td.cell-price,
  .ledger-table td.cell-total {
    font-family: var(--font-mono);
  }
  .ledger-table td.num { text-align: right; }
  .ledger-table td.cell-total { font-weight: 600; }
  .ledger-table td.cell-actions {
    text-align: right;
    white-space: nowrap;
  }
  .ledger-table td.cell-actions .row-actions {
    display: inline-flex;
    gap: 4px;
  }
  .ledger-edit-input {
    width: 100%;
    border: 1.5px solid var(--steel);
    border-radius: 5px;
    padding: 7px 8px;
    font-size: 14px;
    font-family: var(--font-mono);
    background: #fff;

/* ============================================================
   PRICE TREND ALERTS — algorithm constants
   A spike fires when the latest delivery price is ≥ SPIKE_PCT
   above the rolling average of all prior deliveries of that
   material. A savings note fires when it is ≥ SAVINGS_PCT below
   that average AND at or near the historical minimum.
   ============================================================ */
const SPIKE_PCT = 12; // percent above prior avg → spike
const SAVINGS_PCT = 8; // percent below prior avg (at/near min) → savings

function computePriceAlerts(logs) {
  // Group all logs by material name, keeping only entries with a valid price.
  const byMaterial = new Map();
  for (const l of logs) {
    const key = (l.material_name || "").trim();
    const price = Number(l.unit_price);
    if (!key || Number.isNaN(price) || price <= 0) continue;
    if (!byMaterial.has(key)) byMaterial.set(key, []);
    byMaterial.get(key).push(l);
  }
  const spikes = [];
  const savings = [];
  let materialsAnalyzed = 0;
  for (const [material, entries] of byMaterial) {
    // Need at least two entries to compare anything.
    if (entries.length < 2) continue;
    materialsAnalyzed++;

    // Chronological sort (oldest → newest). Use ID as tiebreaker.
    const sorted = [...entries].sort((a, b) => a.date !== b.date ? a.date < b.date ? -1 : 1 : a.id - b.id);
    const latestEntry = sorted[sorted.length - 1];
    const latestPrice = Number(latestEntry.unit_price);
    const latestDate = latestEntry.date;
    const priorPrices = sorted.slice(0, -1).map(e => Number(e.unit_price));
    const priorAvg = priorPrices.reduce((s, p) => s + p, 0) / priorPrices.length;
    const histMin = Math.min(...priorPrices, latestPrice);
    const spikeThr = priorAvg * (1 + SPIKE_PCT / 100);
    const savingsThr = priorAvg * (1 - SAVINGS_PCT / 100);
    if (latestPrice >= spikeThr) {
      const changePct = (latestPrice - priorAvg) / priorAvg * 100;
      spikes.push({
        material,
        latestPrice,
        latestDate,
        priorAvg,
        changePct,
        entryCount: entries.length
      });
    } else if (latestPrice <= savingsThr && latestPrice <= histMin * 1.05) {
      const savingsPct = (priorAvg - latestPrice) / priorAvg * 100;
      savings.push({
        material,
        latestPrice,
        latestDate,
        priorAvg,
        savingsPct,
        isAtMin: latestPrice <= histMin,
        entryCount: entries.length
      });
    }
  }
  spikes.sort((a, b) => b.changePct - a.changePct);
  savings.sort((a, b) => b.savingsPct - a.savingsPct);
  return {
    spikes,
    savings,
    materialsAnalyzed
  };
}
